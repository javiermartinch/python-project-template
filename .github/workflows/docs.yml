# =============================================================================
# Deploy documentation to GitHub Pages via MkDocs Material
# Triggers on push to main (only if docs/ or mkdocs.yml changed)
# =============================================================================

name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install docs dependencies
        run: uv sync

      - name: Build & Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force
